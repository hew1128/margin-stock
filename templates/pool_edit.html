{% extends 'base.html' %}
{% block content %}
<div class="ph">
  <div>
    <a href="/pool/{{ pool.id }}" style="font-size:13px;color:#6b7280;text-decoration:none">← 풀 상세</a>
    <h1 style="margin-top:4px">풀 수정</h1>
  </div>
</div>

<form method="POST" action="/pool/{{ pool.id }}/edit">

  {# ── 기본 정보 ── #}
  <div class="card" style="margin-bottom:14px">
    <div class="row2" style="gap:24px">
      <div class="form-group" style="margin:0">
        <label>그룹명 <span style="color:#ef4444">*</span></label>
        <input type="text" name="group_name" class="form-control" required value="{{ pool.group_name }}"
               style="font-size:15px;font-weight:600">
      </div>
      <div class="form-group" style="margin:0">
        <label>풀 이름 <span style="color:#ef4444">*</span></label>
        <input type="text" name="pool_name" class="form-control" required value="{{ pool.pool_name }}"
               style="font-size:15px">
      </div>
    </div>
  </div>

  {# ── 사입 정보 ── #}
  <div class="card" style="margin-bottom:14px">
    <div class="card-title">사입 정보</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px">
      <div class="form-group" style="margin:0">
        <label>사입일</label>
        <input type="date" name="purchase_date" class="form-control"
               value="{{ pool.purchase_date or '' }}">
      </div>
      <div class="form-group" style="margin:0">
        <label>결제방식</label>
        <select name="payment_method" class="form-control" id="payMethod" onchange="togglePay(this.value)">
          <option value="위안화" {% if pool.payment_method == '위안화' %}selected{% endif %}>위안화</option>
          <option value="원화"   {% if pool.payment_method == '원화'   %}selected{% endif %}>원화</option>
          <option value="카드"   {% if pool.payment_method == '카드'   %}selected{% endif %}>카드</option>
        </select>
      </div>
      <div class="form-group" style="margin:0" id="exchWrap">
        <label>환율 (위안→원)</label>
        <input type="number" name="exchange_rate" class="form-control" step="0.01"
               value="{{ pool.exchange_rate or 190 }}">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group" style="margin:0">
        <label id="buyLabel">개당 사입가 (위안)</label>
        <input type="number" name="purchase_price_cny" id="cnyInput" class="form-control" step="0.01"
               value="{{ pool.purchase_price_cny or 0 }}">
        <input type="number" name="purchase_price_krw" id="krwInput" class="form-control" step="1"
               value="{{ pool.purchase_price_krw or 0 }}" style="display:none">
      </div>
      <div id="cardWrap" style="display:none">
        {% set card_parts = (pool.card_info or '').split() %}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div class="form-group" style="margin:0">
            <label>카드사</label>
            <input type="text" name="card_company" class="form-control" placeholder="신한, 삼성..."
                   value="{{ card_parts[0] if card_parts|length > 0 else '' }}">
          </div>
          <div class="form-group" style="margin:0">
            <label>카드번호 뒤 4자리</label>
            <input type="text" name="card_last4" class="form-control" maxlength="4"
                   value="{{ card_parts[1] if card_parts|length > 1 else '' }}"
                   oninput="this.value=this.value.replace(/[^0-9]/g,'')">
          </div>
        </div>
      </div>
    </div>
  </div>

  {# ── 재고 추가 ── #}
  <div class="card" style="margin-bottom:14px">
    <div class="card-title">재고 추가 <span style="font-size:12px;font-weight:400;color:#9ca3af">0이면 재고 변경 없음</span></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
      <div class="form-group" style="margin:0">
        <label>수량 (개)</label>
        <input type="number" name="add_quantity" class="form-control" value="0" min="0">
      </div>
      <div class="form-group" style="margin:0">
        <label>입고일</label>
        <input type="date" name="add_date" id="addDate" class="form-control">
      </div>
      <div class="form-group" style="margin:0">
        <label>메모</label>
        <input type="text" name="add_memo" class="form-control" placeholder="예: 초기 사입">
      </div>
    </div>
  </div>

  {# ── 비용 ── #}
  <div class="card" style="margin-bottom:14px">
    <div class="card-title">비용</div>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px">
      <div class="form-group" style="margin:0">
        <label>관세 합계 (원)</label>
        <input type="number" name="customs_total" class="form-control" value="{{ pool.customs_total }}">
      </div>
      <div class="form-group" style="margin:0">
        <label>운송비 합계 (원)</label>
        <input type="number" name="shipping_total" class="form-control" value="{{ pool.shipping_total }}">
      </div>
      <div class="form-group" style="margin:0">
        <label>용달 합계 (원)</label>
        <input type="number" name="yongdal_total" class="form-control" value="{{ pool.yongdal_total }}">
      </div>
      <div class="form-group" style="margin:0">
        <label>네이버 수수료 (%)</label>
        <input type="number" name="naver_fee_rate" class="form-control" step="0.01" value="{{ pool.naver_fee_rate }}">
      </div>
      <div class="form-group" style="margin:0">
        <label>국내 택배비 (원)</label>
        <input type="number" name="domestic_shipping" class="form-control" value="{{ pool.domestic_shipping }}">
      </div>
    </div>
  </div>

  <div style="display:flex;gap:10px">
    <button type="submit" class="btn btn-primary">저장</button>
    <a href="/pool/{{ pool.id }}" class="btn btn-secondary">취소</a>
  </div>
</form>

<script>
(function() {
  togglePay(document.getElementById('payMethod').value);
  var d = document.getElementById('addDate');
  if (d && !d.value) d.value = new Date().toISOString().slice(0,10);
})();

function togglePay(method) {
  var isCny  = method === '위안화';
  var isCard = method === '카드';
  document.getElementById('exchWrap').style.opacity  = isCny ? '1' : '0.35';
  document.getElementById('buyLabel').textContent    = isCny ? '개당 사입가 (위안)' : '개당 사입가 (원)';
  document.getElementById('cnyInput').style.display  = isCny ? '' : 'none';
  document.getElementById('krwInput').style.display  = isCny ? 'none' : '';
  document.getElementById('cardWrap').style.display  = isCard ? '' : 'none';
}
</script>
{% endblock %}
